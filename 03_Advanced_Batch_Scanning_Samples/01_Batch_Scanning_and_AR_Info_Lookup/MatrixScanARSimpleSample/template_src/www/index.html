<!doctype html>
<html>
  <head>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: gap: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="viewport" content="width=device-width, user-scalable=no, viewport-fit=cover" />
    <title>MatrixScan AR Simple Sample</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: absolute;
        margin: 0;
        font-family: 'Roboto', Arial, Helvetica, sans-serif;
      }

      button {
        width: 90vw;
        height: 60px;
        background: #2ec1ce;
        border: none;
        color: white;
        font-size: 1em;
        font-weight: bold;
      }

      .return-button-container {
        padding-left: 48px;
        display: flex;
        justify-content: center;
        flex-direction: column;
      }

      .return-button {
        background: #525a61;
        border: none;
        border-radius: 9999px;
        width: 48px;
        height: 48px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .return-button img {
        margin: 4px 3px 4px 5px;
        width: 24px;
        height: 24px;
      }

      .return-button-text {
        font-family: 'Roboto', sans-serif;
        font-size: 10px;
        color: white;
        margin: 0;
        text-align: center;
      }

      /* Toolbar styles */
      .toolbar {
        height: 75px;
        background-color: black;
        padding-top: calc(env(safe-area-inset-top, 0px) + 28px);
        padding-bottom: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toolbar-title {
        font-family: 'Roboto', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: white;
        margin: 0;
      }

      .bottom-toolbar {
        display: flex;
        padding-top: 48px;
        padding-bottom: 48px;
        background-color: black;
        justify-content: left-start;
        align-items: center;
      }

      #barcode-ar-view {
        flex: 1;
      }

      .top {
        position: relative;
        top: 0;
        width: 100vw;
        height: 100vh;
      }

      .bottom {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #list {
        width: 100vw;
        height: calc(
          100vh - env(safe-area-inset-top, 20px) - calc(env(safe-area-inset-bottom, 0px) + 40px) - 20px - 60px
        );
        padding-top: env(safe-area-inset-top, 20px);
        overflow: scroll;
      }

      .result {
        margin: 10px;
        padding: 10px;
        border-bottom: 1px solid lightgrey;
      }

      .result p {
        margin: 0;
      }

      .symbology {
        color: #2ec1ce;
        font-size: 0.9em;
      }

      /* Home Screen Styles */
      #home {
        background-color: #f7f7f7;
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
        position: relative;
      }

      .home-content {
        padding: 48px 16px 0;
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      .scanning-screen {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .header-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 238px;
      }

      .logo {
        width: 95.2px;
        height: 14px;
      }

      .logo img {
        width: 100%;
        height: 100%;
        display: block;
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 32px;
        font-weight: 700;
        line-height: 38px;
        color: #077f8a;
        letter-spacing: 0.5px;
        text-align: center;
        margin: 0;
      }

      .features-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .features-label {
        font-family: 'Roboto', sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: normal;
        color: #16191c;
        margin: 0;
      }

      .features-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .feature-card {
        background-color: #16191c;
        width: 164px;
        height: 164px;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .feature-card:active {
        opacity: 0.8;
      }

      .feature-icon {
        background-color: #ffffff;
        width: 36px;
        height: 36px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .feature-icon img {
        width: 24px;
        height: 24px;
      }

      .feature-content {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .feature-title {
        font-family: 'Roboto', sans-serif;
        font-size: 16px;
        font-weight: 500;
        line-height: 22px;
        color: #ffffff;
        margin: 0;
      }

      .feature-description {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 400;
        line-height: 21px;
        color: #ffffff;
        margin: 0;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Home Screen -->
    <div id="home">
      <div class="home-content">
        <div class="header-section">
          <div class="logo">
            <img src="assets/logo.svg" alt="Scandit Logo" />
          </div>
          <h1 class="title">MatrixScan AR</h1>
        </div>

        <div class="features-section">
          <p class="features-label">Try These Features:</p>
          <div class="features-grid">
            <div class="feature-card" onclick="startScanning('highlights')">
              <div class="feature-icon">
                <img src="assets/scan.svg" alt="Scan" />
              </div>
              <div class="feature-content">
                <p class="feature-title">Highlights</p>
                <p class="feature-description">Visualize scanned codes</p>
              </div>
            </div>

            <div class="feature-card" onclick="startScanning('info-annotations')">
              <div class="feature-icon">
                <img src="assets/tooltip.svg" alt="Info" />
              </div>
              <div class="feature-content">
                <p class="feature-title">Info Annotations</p>
                <p class="feature-description">Show additional information</p>
              </div>
            </div>

            <div class="feature-card" onclick="startScanning('popovers')">
              <div class="feature-icon">
                <img src="assets/outbox.svg" alt="Popovers" />
              </div>
              <div class="feature-content">
                <p class="feature-title">Popovers</p>
                <p class="feature-description">Take action on scanned codes</p>
              </div>
            </div>

            <div class="feature-card" onclick="startScanning('status-icons')">
              <div class="feature-icon">
                <img src="assets/status.svg" alt="Status" />
              </div>
              <div class="feature-content">
                <p class="feature-title">Status icons</p>
                <p class="feature-description">Provide short information</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scanning Screen -->
    <div id="scanning" class="hidden scanning-screen">
      <div class="toolbar">
        <p class="toolbar-title" id="toolbar-title">Highlights</p>
      </div>
      <div id="barcode-ar-view"></div>
      <div class="bottom-toolbar">
        <div class="return-button-container">
          <button class="return-button" onclick="done()">
            <img src="assets/ic_return.svg" alt="Return" />
          </button>
          <p class="return-button-text">Return</p>
        </div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results" class="hidden">
      <div id="list" class="top"></div>
      <div class="bottom">
        <button onclick="scanAgain()">SCAN AGAIN</button>
      </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="index.js"></script>
  </body>
</html>
